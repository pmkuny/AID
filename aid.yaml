# Example AID.yaml Manifest

# This is a sample manifest for the AID standard.
# It helps automated tools understand your project's AI disclosure status.

schema_version: "1.0"

# The disclosure level for this specific repository.
# Options: ZAID, SAID, MAID-A, MAID-C, FAID
disclosure_level: "MAID-A"

# Special usage tags
# Options: DAID, TAID, IAID, HAID
special_usage:
  - "DAID"

# Information about your direct dependencies
# This is a "Best Effort" (BE) disclosure.
inherited_disclosure:
  - name: "requests"
    level: "ZAID"
  - name: "some-ai-library"
    level: "SAID"
    status: "Best Effort"

# Optional: List of AI tools used in your workflow
# This helps with provenance.
tools_used:
  - "GitHub Copilot"
  - "ChatGPT"
